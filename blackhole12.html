<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles Swarm Export</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // CONFIG
        const COUNT = 20000;
        const SPEED_MULT = 1;
        const AUTO_SPIN = true;

        // SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.01);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = AUTO_SPIN;
        controls.autoRotateSpeed = 2.0;

        // POST PROCESSING
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 1.8; bloomPass.radius = 0.4; bloomPass.threshold = 0;
        composer.addPass(bloomPass);

        // SWARM OBJECTS
        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        const target = new THREE.Vector3();
        const pColor = new THREE.Color(); // Kept for safety, for potential references
        
        // INSTANCED MESH
        const geometry = new THREE.TetrahedronGeometry(0.25);
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const instancedMesh = new THREE.InstancedMesh(geometry, material, COUNT);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        // DATA ARRAYS
        const positions = [];
        for(let i=0; i<COUNT; i++) {
            positions.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
            instancedMesh.setColorAt(i, color.setHex(0x00ff88)); // Init Color
        }

        // CONTROL STUBS
        const PARAMS = {"radius":104.8,"flow":0.39,"vortex":3.28,"layers":7.88,"pulse":1.12};
        const addControl = (id, label, min, max, val) => {
            return PARAMS[id] !== undefined ? PARAMS[id] : val;
        };
        const setInfo = () => {};
        const annotate = () => {};

        // ANIMATION LOOP
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime() * SPEED_MULT;
            
            // Shader Time Update
            if(material.uniforms && material.uniforms.uTime) {
                material.uniforms.uTime.value = time;
            }

            controls.update();

            // SWARM LOGIC
            const count = COUNT; // Alias for user code compatibility
            for(let i=0; i<COUNT; i++) {
                 // USER CODE INJECTION START
                 const radius = addControl("radius", "Field Radius", 40, 220, 120);
                 const flow = addControl("flow", "Flow Speed", 0, 3, 0.9);
                 const vortex = addControl("vortex", "Vortex Strength", 0, 8, 3.5);
                 const layers = addControl("layers", "Energy Layers", 2, 16, 8);
                 const pulse = addControl("pulse", "Pulse", 0, 4, 1.5);
                 
                 const t = i / (count + 0.0001);
                 const layer = Math.floor(t * layers);
                 const layerT = layer / (layers + 0.0001);
                 
                 const golden = 2.399963229728653;
                 const phi = Math.acos(1 - 2 * t);
                 const theta = i * golden + time * flow;
                 
                 const wave = Math.sin(theta * 2.0 + time * pulse + layerT * 12.0);
                 const breathing = 1.0 + 0.18 * Math.sin(time * pulse + layerT * 8.0);
                 
                 const r = radius * breathing;
                 
                 const sx = Math.sin(phi) * Math.cos(theta);
                 const sy = Math.cos(phi);
                 const sz = Math.sin(phi) * Math.sin(theta);
                 
                 const swirl = vortex * (0.15 + 0.85 * Math.abs(sy));
                 
                 const x = (sx + Math.cos(theta * 3.0 + time) * swirl * 0.08) * r;
                 const y = (sy + wave * 0.12) * r;
                 const z = (sz + Math.sin(theta * 3.0 + time) * swirl * 0.08) * r;
                 
                 target.set(x, y, z);
                 
                 const energy = 0.5 + 0.5 * wave;
                 const hue = (0.55 + energy * 0.25 + layerT * 0.15 + time * 0.02) % 1;
                 const saturation = 0.8 + energy * 0.2;
                 const lightness = 0.25 + energy * 0.5 + (1.0 - Math.abs(sy)) * 0.15;
                 
                 color.setHSL(
                 hue < 0 ? hue + 1 : hue,
                 saturation > 1 ? 1 : saturation,
                 lightness > 1 ? 1 : lightness
                 );
                 
                 if (i === 0) {
                 setInfo(
                 "Quantum Vortex Sphere",
                 "A living energy shell formed from golden-angle particle packing, layered wave interference, and rotating vortex currents."
                 );
                 annotate("core", new THREE.Vector3(0, 0, 0), "Quantum Core");
                 }
                 // USER CODE INJECTION END

                 // LERP & UPDATE
                 positions[i].lerp(target, 0.1);
                 dummy.position.copy(positions[i]);
                 dummy.updateMatrix();
                 instancedMesh.setMatrixAt(i, dummy.matrix);
                 instancedMesh.setColorAt(i, color); // Fix: Use 'color' which user modifies
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
